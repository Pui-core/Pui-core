services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pui_core_test}
      POSTGRES_USER: ${POSTGRES_USER:-pui_core}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pui_core_local_password}
    volumes:
      - pui_core_test_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:${PUI_CORE_TEST_DB_PORT:-5432}:5432"

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci --omit=dev && npm start"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://pui_core:pui_core_local_password@db:5432/pui_core_test}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PUI_CORE_TEST_API_PORT:-8080}:8080"
    volumes:
      - ./public:/app
      - pui_core_test_node_modules:/app/node_modules
      - ./secrets:/run/secrets:ro

volumes:
  pui_core_test_pgdata:
  pui_core_test_node_modules:
